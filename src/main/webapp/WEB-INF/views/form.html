<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Nhân sự</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2 th:text="${employee.id == null ? 'Thêm mới Nhân sự' : 'Cập nhật Nhân sự'}"></h2>

<div class="form-container">
    <form th:action="@{/save}" th:object="${employee}" method="post" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Họ và Tên</label>
            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nhập đầy đủ họ tên">
            <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
        </div>

        <div class="form-group">
            <label>Vị trí / Chức vụ</label>
            <input type="text" th:field="*{position}" class="form-control" placeholder="VD: Developer, Accountant...">
            <span class="error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></span>
        </div>

        <div class="form-group">
            <label>Mức Lương cơ bản</label>
            <input type="number" th:field="*{salary}" class="form-control" placeholder="0.0">
            <span class="error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span>
        </div>

        <div class="form-group">
            <label>Ảnh đại diện (JPG/PNG)</label>
            <input type="file" th:field="*{avatarFile}" class="form-control" accept="image/*">

            <div th:if="${employee.avatar != null}" style="margin-top: 15px;">
                <p style="font-size: 12px; color: #666;">Ảnh hiện tại:</p>
                <img th:src="@{'/uploads/' + ${employee.avatar}}"
                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
            </div>
        </div>

        <div style="margin-top: 25px;">
            <button type="submit" class="btn btn-save">Lưu dữ liệu</button>
            <a th:href="@{/list}" class="btn btn-cancel">Quay lại</a>
        </div>
    </form>
</div>

</body>
</html>
